<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Particles.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

    <title>Taskify6 - Study Planner</title>
  </head>

  <body class="bg-gray-50 dark:bg-slate-800 transition min-h-screen flex flex-col relative">
    <!-- Particles Background -->
    <div
      id="particles-js"
      class="fixed top-0 left-0 w-full h-full -z-10"
    ></div>

    <!-- Header -->
    <header
      class="bg-gradient-to-r from-green-500 to-blue-500 text-white p-3 shadow-md flex justify-between items-center relative z-10"
    >
      <h1 class="text-4xl font-bold tracking-wide text-center">TASKIFY6</h1>

      <!-- Dark/Ligth Mode -->
      <button
        class="bg-gray-200 text-gray-800 px-3 py-1 rounded hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-100 dark:hover:bg-gray-600 transition"
        onclick="switchMode()"
      >
        <span id="sun">🌞</span>
        <span id="moon" class="hidden">🌙</span>
      </button>
    </header>

    <main class="flex-grow bg-gray-50/80 dark:bg-slate-800/80 relative z-10">
      <!-- Input Section -->
      <section
        class="flex flex-col sm:flex-row gap-4 p-4 bg-green-50 rounded-lg shadow-sm dark:bg-gray-800 rounded-lg shadow-sm relative z-10"
      >
        <input
          type="text"
          id="taskInput"
          placeholder="Select day and Enter task"
          onclick="showDaySelect()"
          class="flex-1 border border-green-300 rounded-lg p-2 focus:ring-2 focus:ring-green-400 outline-none dark:border-gray-400 dark:bg-gray-700 dark:text-gray-50"
        />

        <!-- DropDown -->
        <select
          id="daySelect"
          class="hidden border border-green-300 rounded-lg p-2 focus:ring-2 focus:ring-green-400 outline-none dark:border-gray-600 dark:text-gray-50 dark:bg-gray-800"
          onchange="selectDay(this.value)"
        >
          <option value="Monday">Monday</option>
          <option value="Tuesday">Tuesday</option>
          <option value="Wednesday">Wednesday</option>
          <option value="Thursday">Thursday</option>
          <option value="Friday">Friday</option>
          <option value="Saturday">Saturday</option>
        </select>
        <button
          class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 transition duration-300"
          onclick="addTask()"
        >
          Add Task
        </button>
      </section>

      <!-- Quote section -->
       <div id="quoteBar" class="w-full text-center p-4 rounded-md shadow-md mt-4 transition-colors duration-500 ease-in-out bg-gradient-to-r from-green-700 via-teal-200 to-blue-200 dark:from-green-700 dark:via-teal-800 dark:to-blue-900 relative z-10">
        <span id="quoteText" class="block h-6 italic text-lg md:text-xl font-semibold tracking-wide text-gray-800 dark:text-gray-100"></span>
       </div>

      <!-- Streak section -->
      <section class="streak bg-yellow-50 dark:bg-gray-700 p-3 rounded-lg shadow-md text-center mx-auto mt-2 relative z-10 w-64">
  <h2 class="text-2xl font-bold text-green-700 dark:text-gray-100 mb-4">
    Your Study Streak 🔥
  </h2>
  <p id="streakCount" class="text-xl font-semibold text-gray-800 dark:text-gray-200">
    Current Streak: 0 days
  </p>
</section>

      <!-- Days Section -->
      <section class="grid grid-cols-1 sm:grid-cols-3 lg:grid-cols-2 gap-6 p-6">
        <div
          class="day bg-white hover:shadow-lg transition dark:text-gray-100 dark:bg-gray-700 rounded-xl shadow-md p-4 hover:shadow-xl hover:border hover:border-green-300 transition"
          id="Monday"
        >
          <h3 class="text-xl font-bold mb-2">Monday</h3>
          <ul id="taskList-Monday" class="space-y-2">
          </ul>
        </div>
        <div
          class="day bg-white hover:shadow-lg transition dark:text-gray-100 dark:bg-gray-700 rounded-xl shadow-md p-4 hover:shadow-xl hover:border hover:border-green-300 transition"
          id="Tuesday"
        >
          <h3 class="text-xl font-bold mb-2">Tuesday</h3>
          <ul id="taskList-Tuesday" class="space-y-2"></ul>
        </div>
        <div
          class="day bg-white hover:shadow-lg transition dark:text-gray-100 dark:bg-gray-700 rounded-xl shadow-md p-4 hover:shadow-xl hover:border hover:border-green-300 transition"
          id="Wednesday"
        >
          <h3 class="text-xl font-bold mb-2">Wednesday</h3>
          <ul id="taskList-Wednesday" class="space-y-2"></ul>
        </div>
        <div
          class="day bg-white hover:shadow-lg transition dark:text-gray-100 dark:bg-gray-700 rounded-xl shadow-md p-4 hover:shadow-xl hover:border hover:border-green-300 transition"
          id="Thursday"
        >
          <h3 class="text-xl font-bold mb-2">Thursday</h3>
          <ul id="taskList-Thursday" class="space-y-2"></ul>
        </div>
        <div
          class="day bg-white hover:shadow-lg transition dark:text-gray-100 dark:bg-gray-700 rounded-xl shadow-md p-4 hover:shadow-xl hover:border hover:border-green-300 transition"
          id="Friday"
        >
          <h3 class="text-xl font-bold mb-2">Friday</h3>
          <ul id="taskList-Friday" class="space-y-2"></ul>
        </div>
        <div
          class="day bg-white hover:shadow-lg transition dark:text-gray-100 dark:bg-gray-700 rounded-xl shadow-md p-4 hover:shadow-xl hover:border hover:border-green-300 transition"
          id="Saturday"
        >
          <h3 class="text-xl font-bold mb-2">Saturday</h3>
          <ul id="taskList-Saturday" class="space-y-2"></ul>
        </div>
      </section>

      <!-- Analysis section -->
      <section
        class="analysis bg-blue-50 p-6 rounded-lg shadow-md dark:bg-gray-800 flex flex-col items-center justify-center text-center relative z-10"
      >
        <h2
          class="text-2xl font-bold text-green-700 mb-4 dark:text-gray-100 mb-4"
        >
          Weekly Analysis (Sunday)
        </h2>
        <button
          class="bg-blue-500 hover:bg-blue-700 transition dark:bg-yellow-600 text-white px-4 py-2 rounded dark:hover:bg-yellow-700 transition"
          onclick="showAnalysis()"
        >
          Show Report
        </button>
        <p
          id="analysisResult"
          class="mt-4 text-gray-700 font-meduim dark:text-gray-300 font-medium"
        ></p>
        <canvas
          id="progressChart"
          class="w-48 h-48 mx-auto"
        ></canvas>
      </section>
    </main>

    <!-- History Container -->
  <div id="historyContainer" class="p-4 bg-gray-100 dark:bg-gray-700 rounded shadow">
    <h2 class="text-lg font-bold text-gray-800 dark:text-gray-100 mb-2">Task History</h2>
    <button onclick="clearHistory()" class="mb-3 px-3 py-1 bg-red-400 text-white rounded hover:bg-red-600 transition">
    Clear History
  </button>
  <div id="historyList" class="space-y-4"></div>
</div>


    <!-- Footer -->
    <footer class="bg-gray-200 dark:bg-gray-800 text-center p-4 relative z-10">
      <p class="text-sm text-gray-700 dark:text-gray-300">
        © 2026 Taskify6 — Plan Smart, Study Better
      </p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
